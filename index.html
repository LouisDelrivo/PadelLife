<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PadelLife.fr — L'Équipement Padel Expert</title>
<meta name="description" content="PadelLife.fr — Le spécialiste français du padel. Raquettes, chaussures, accessoires. Conseil d'expert, essai à domicile 7 jours.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0a0a;--dark:#111;--dark2:#1a1a1a;--dark3:#222;
  --white:#fff;--off:#f7f7f7;--grey:#888;--grey2:#444;--grey3:#ccc;
  --green:#2196F3;--green2:#1976D2;--green-bg:rgba(33,150,243,.08);
  --red:#ff1744;--orange:#ff6d00;--blue:#2979ff;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Inter',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--white);background:var(--black);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:var(--font-body);cursor:pointer;border:none}
img{display:block;max-width:100%}
::selection{background:var(--green);color:var(--white)}

/* ═══ ANNOUNCEMENT BAR ═══ */
.announce{background:var(--green);color:var(--white);text-align:center;padding:8px 20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;position:relative;z-index:99}

/* ═══ HEADER ═══ */
.hd{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .3s var(--ease),backdrop-filter .3s}
.hd.scrolled{background:rgba(10,10,10,.92);backdrop-filter:blur(20px)}
.hd-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;height:64px}
.hd-logo{font-family:var(--font-display);font-size:28px;letter-spacing:2px;cursor:pointer;display:flex;align-items:baseline;gap:1px}
.hd-logo span{color:var(--green)}
.hd-nav{display:flex;gap:28px;list-style:none}
.hd-nav li{font-size:13px;font-weight:600;cursor:pointer;position:relative;padding:4px 0;letter-spacing:.3px;transition:color .2s}
.hd-nav li:hover{color:var(--green)}
.hd-nav li::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:var(--green);transition:width .25s var(--ease)}
.hd-nav li:hover::after{width:100%}
.hd-nav li.active{color:var(--green)}
.hd-nav li.active::after{width:100%}
.hd-right{display:flex;align-items:center;gap:12px}
.hd-search-btn,.hd-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--white);font-size:16px;transition:background .2s;border:1px solid transparent}
.hd-search-btn:hover,.hd-icon:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1)}
.hd-icon .badge{position:absolute;top:-2px;right:-2px;background:var(--green);color:var(--white);font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.hd-icon{position:relative}

/* ═══ SEARCH OVERLAY ═══ */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;flex-direction:column;align-items:center;padding-top:120px;animation:fadeIn .2s}
.search-overlay.open{display:flex}
.search-close{position:absolute;top:20px;right:40px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-box{width:90%;max-width:700px}
.search-box input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--grey2);padding:16px 0;font-size:32px;font-family:var(--font-display);color:var(--white);outline:none;letter-spacing:1px;caret-color:var(--green)}
.search-box input::placeholder{color:var(--grey2)}
.search-box input:focus{border-bottom-color:var(--green)}
.search-results-area{width:90%;max-width:700px;margin-top:20px;max-height:50vh;overflow-y:auto}
.sr-item{display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s;border-radius:4px;padding:12px}
.sr-item:hover{background:rgba(255,255,255,.04)}
.sr-item img{width:56px;height:56px;object-fit:contain;background:rgba(255,255,255,.04);border-radius:6px}
.sr-item .sr-cat{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--grey);font-weight:700}
.sr-item .sr-name{font-size:14px;font-weight:700;margin:2px 0}
.sr-item .sr-price{font-size:13px;color:var(--green);font-weight:700}
.search-trending{margin-top:30px;width:90%;max-width:700px}
.search-trending h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--grey);margin-bottom:12px;font-weight:700}
.search-trending .tags{display:flex;gap:8px;flex-wrap:wrap}
.search-trending .tag{padding:8px 16px;border:1px solid var(--grey2);border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.search-trending .tag:hover{border-color:var(--green);color:var(--green)}

/* ═══ HERO ═══ */
.hero{position:relative;height:100vh;min-height:700px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:80px}
.hero-video{position:absolute;inset:0;z-index:0;opacity:0.35;}
.hero-video video{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,10,0.8) 0%,rgba(10,10,10,0.4) 40%,rgba(10,10,10,1) 100%);z-index:1}
.hero-content{position:relative;z-index:2;text-align:center;max-width:800px}
.hero-tag{font-size:12px;text-transform:uppercase;letter-spacing:3px;color:var(--green);font-weight:700;margin-bottom:16px}
.hero h1{font-family:var(--font-display);font-size:clamp(64px,10vw,120px);line-height:.9;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.hero-desc{font-size:15px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto 32px;line-height:1.7}
.hero-ctas{display:flex;gap:12px;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:50px;font-size:13px;font-weight:700;transition:all .25s var(--ease);letter-spacing:.3px}
.btn-white{background:var(--white);color:var(--black)}
.btn-white:hover{background:var(--green);color:var(--white);transform:scale(1.03)}
.btn-ghost{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,.3)}
.btn-ghost:hover{border-color:var(--white);background:rgba(255,255,255,.06)}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{background:var(--green2);transform:scale(1.03)}
.btn-dark{background:var(--dark3);color:var(--white)}
.btn-dark:hover{background:var(--green);color:var(--white)}
.btn-sm{padding:10px 20px;font-size:12px}
.btn-full{width:100%;justify-content:center}

/* ═══ REAS BAR ═══ */
.reas-bar{background:var(--dark);border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
.reas-inner{max-width:1440px;margin:0 auto;display:flex;padding:0 40px}
.reas-i{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 12px;cursor:pointer;transition:background .2s;border-right:1px solid rgba(255,255,255,.06)}
.reas-i:last-child{border-right:none}
.reas-i:hover{background:rgba(255,255,255,.03)}
.reas-i .ri-icon{font-size:18px}.reas-i strong{font-size:11px;font-weight:700}.reas-i span{font-size:10px;color:var(--grey)}

/* ═══ SECTION LAYOUTS ═══ */
.sec{max-width:1440px;margin:0 auto;padding:60px 40px}
.sec-dark{background:var(--black)}
.sec-light{background:rgba(255,255,255,.03);color:var(--white)}
.sec-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px}
.sec-header h2{font-family:var(--font-display);font-size:48px;letter-spacing:1px;text-transform:uppercase;line-height:1}
.sec-header .sh-sub{font-size:13px;color:var(--grey);margin-top:6px}
.sec-link{font-size:12px;font-weight:700;text-decoration:underline;cursor:pointer;transition:color .15s;text-underline-offset:3px}
.sec-link:hover{color:var(--green)}
.sec-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:20px;padding:8px 16px;border-radius:50px;background:rgba(255,255,255,.06);color:var(--white);transition:all .15s}
.sec-back:hover{background:var(--green);color:var(--white)}

/* ═══ PRODUCT GRID ═══ */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.pgrid-3{grid-template-columns:repeat(3,1fr)}
.pcard{background:var(--dark2);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s;position:relative}
.pcard:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.pcard .pi{position:relative;background:rgba(255,255,255,.03);padding:20px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
.sec-light .pcard .pi{background:rgba(255,255,255,.03)}
.pcard .pi img{max-width:82%;max-height:82%;object-fit:contain;transition:transform .35s var(--ease)}
.pcard:hover .pi img{transform:scale(1.08)}
.pcard .pbadge{position:absolute;top:12px;left:12px;font-size:9px;font-weight:800;padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px}
.pb-new{background:var(--white);color:var(--white)}.pb-top{background:var(--green);color:var(--white)}
.pb-sale{background:var(--red);color:var(--white)}.pb-expert{background:var(--blue);color:var(--white)}
.pcard .pdisc{position:absolute;top:12px;right:12px;font-size:10px;background:var(--red);color:var(--white);padding:3px 8px;border-radius:50px;font-weight:700}
.pcard .pf{padding:16px 18px 20px}
.pcard .pf .pbrand{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--grey);font-weight:700;margin-bottom:3px}
.pcard .pf .pname{font-size:14px;font-weight:700;margin-bottom:6px;line-height:1.3}
.sec-light .pcard .pf .pname{color:var(--white)}
.pcard .pf .pstars{display:flex;align-items:center;gap:4px;margin-bottom:8px;font-size:11px}
.pcard .pf .pstars .s{color:#ffc107}.pcard .pf .pstars .c{color:var(--grey);font-size:10px}
.pcard .pf .prow{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.pcard .pf .pprice{font-size:18px;font-weight:800}
.pcard .pf .pold{font-size:12px;color:var(--grey);text-decoration:line-through}
.pcard .pf .p3x{font-size:9px;color:var(--grey);margin-bottom:10px}
.pcard .pf .padd{width:100%;padding:10px;background:var(--white);color:var(--black);border-radius:50px;font-size:11px;font-weight:700;transition:all .2s}
.pcard .pf .padd:hover{background:var(--green);color:var(--white)}

/* ═══ AI ADVISOR (kept for results) ═══ */
.advisor{background:linear-gradient(135deg,var(--dark) 0%,#0d0d2a 100%);border-radius:16px;padding:48px;margin:0 40px;position:relative;overflow:hidden;border:1px solid rgba(41,98,255,.15)}
.advisor::before{content:'';position:absolute;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,200,83,.08) 0%,transparent 70%);border-radius:50%}
.advisor-inner{position:relative;z-index:1;max-width:900px;margin:0 auto}
.advisor-header{text-align:center;margin-bottom:8px}
.advisor-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(0,200,83,.12);color:var(--green);padding:6px 16px;border-radius:50px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.advisor-header h2{font-family:var(--font-display);font-size:42px;letter-spacing:1px;text-transform:uppercase}
.advisor-sub{text-align:center;color:var(--grey);font-size:13px;margin-bottom:28px}
.advisor-progress{display:flex;gap:4px;justify-content:center;margin-bottom:24px}
.advisor-dot{height:3px;width:60px;border-radius:2px;background:var(--grey2);transition:all .3s}
.advisor-dot.active{background:var(--green);width:80px}.advisor-dot.done{background:var(--white)}
.advisor-q{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px}
.advisor-opts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.advisor-opt{border:2px solid var(--grey2);border-radius:12px;padding:20px 28px;cursor:pointer;text-align:center;transition:all .2s var(--ease);min-width:160px;background:rgba(255,255,255,.02)}
.advisor-opt:hover{border-color:var(--green);background:var(--green-bg);transform:translateY(-2px)}
.advisor-opt .ao-icon{font-size:28px;margin-bottom:8px}
.advisor-opt strong{display:block;font-size:14px;margin-bottom:3px}
.advisor-opt span{font-size:11px;color:var(--grey)}
.advisor-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:24px}
.advisor-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s}
.advisor-card:hover{border-color:var(--green);transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.advisor-card img{width:100%;height:120px;object-fit:contain;margin-bottom:10px}
.advisor-match{display:inline-block;font-size:9px;font-weight:800;background:rgba(0,200,83,.15);color:var(--green);padding:3px 8px;border-radius:50px;margin-bottom:6px}
.advisor-card .ac-name{font-size:13px;font-weight:700;margin-bottom:3px}
.advisor-card .ac-why{font-size:10px;color:var(--grey);line-height:1.5;margin-bottom:6px}
.advisor-card .ac-price{font-size:17px;font-weight:800;color:var(--green)}
.advisor-card .ac-add{width:100%;padding:8px;background:var(--white);color:var(--black);border-radius:50px;font-size:10px;font-weight:700;margin-top:8px;transition:all .15s}
.advisor-card .ac-add:hover{background:var(--green)}
.advisor-reset{text-align:center;margin-top:16px;font-size:12px;font-weight:700;color:var(--green);cursor:pointer;text-decoration:underline}

/* ═══ RACKET FINDER (SPLIT-SCREEN) ═══ */
.finder{display:flex;min-height:85vh;background:var(--black);color:var(--white);margin:0}
.finder-left{width:50%;padding:72px 5vw;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.06)}
.finder-tag{color:var(--green);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.finder-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
.finder-title{font-family:var(--font-display);font-size:clamp(42px,5vw,72px);line-height:.88;text-transform:uppercase;margin-bottom:14px}
.finder-desc{font-size:14px;color:rgba(255,255,255,.5);line-height:1.65;font-weight:500;margin-bottom:36px;max-width:420px}
.finder-progress{display:flex;gap:6px;margin-bottom:28px}
.finder-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.12);transition:background .3s}
.finder-dot.done{background:var(--green)}
.finder-q{font-family:var(--font-display);font-size:26px;text-transform:uppercase;margin-bottom:14px;letter-spacing:.5px}
.finder-opts{display:flex;flex-direction:column;gap:10px;width:100%;animation:finderFadeUp .35s cubic-bezier(.16,1,.3,1)}
@keyframes finderFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.finder-opt{padding:18px 22px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;color:var(--white);font-weight:700;font-size:14px;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .25s var(--ease)}
.finder-opt:hover{background:var(--green);border-color:var(--green);transform:translateX(10px)}
.finder-opt svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.finder-right{width:50%;position:relative;overflow:hidden;background:#111}
.finder-right img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.4;filter:grayscale(50%);transition:opacity .5s,filter .5s}
.finder-right:hover img{opacity:.6;filter:grayscale(0%)}
.finder-expert{position:absolute;bottom:36px;left:36px;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);padding:18px 22px;border-left:3px solid var(--green);border-radius:0 8px 8px 0}
.finder-expert h4{font-family:var(--font-display);font-size:22px;text-transform:uppercase;color:var(--white);margin-bottom:3px}
.finder-expert p{font-size:12px;color:rgba(255,255,255,.5);font-weight:600}
.finder-expert-status{display:flex;align-items:center;gap:6px;font-size:11px;color:#00e676;font-weight:700;margin-top:8px}
.finder-expert-status::before{content:'';width:6px;height:6px;background:#00e676;border-radius:50%;animation:pulse 2s infinite}
.finder-results-wrap{animation:finderFadeUp .35s cubic-bezier(.16,1,.3,1)}
@media(max-width:900px){
  .finder{flex-direction:column}
  .finder-left,.finder-right{width:100%}
  .finder-right{height:280px}
}

/* ═══ GUIDES PAR NIVEAU ═══ */
.guides-section{padding:80px 40px 60px;background:rgba(255,255,255,.03);max-width:100%}
.guides-inner{max-width:1440px;margin:0 auto}
.guides-tag{text-align:center;display:block;margin-bottom:14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--green)}
.guides-title{font-family:var(--font-display);font-size:clamp(32px,4vw,52px);text-transform:uppercase;text-align:center;margin-bottom:12px;color:var(--white);letter-spacing:1px}
.guides-sub{text-align:center;color:var(--grey);font-size:14px;font-weight:500;margin-bottom:48px;max-width:640px;margin-left:auto;margin-right:auto;line-height:1.7}
.guides-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.guide-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:30px 26px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:all .3s var(--ease);text-decoration:none;color:var(--white)}
.guide-card:hover{border-color:var(--green);transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.guide-level{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--green)}
.guide-card h3{font-family:var(--font-display);font-size:22px;text-transform:uppercase;line-height:1.05;letter-spacing:.5px}
.guide-card p{font-size:12px;color:var(--grey);font-weight:500;line-height:1.6}
.guide-arrow{margin-top:auto;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--green);letter-spacing:.8px;padding-top:6px}
.guide-arrow svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2;transition:transform .2s}
.guide-card:hover .guide-arrow svg{transform:translateX(4px)}

/* ═══ VIDEO GUIDES ENHANCED ═══ */
.guides-vid-header{text-align:center;margin-bottom:32px}
.guides-vid-header h3{font-family:var(--font-display);font-size:36px;letter-spacing:1px;text-transform:uppercase;color:var(--white);margin-bottom:8px}
.guides-vid-header p{font-size:13px;color:var(--grey);max-width:560px;margin:0 auto;line-height:1.7}
.vid-featured{display:grid;grid-template-columns:1.4fr 1fr;gap:0;background:var(--dark2);border-radius:14px;overflow:hidden;cursor:pointer;margin-bottom:24px;border:1px solid rgba(255,255,255,.06);transition:transform .3s var(--ease),box-shadow .3s}
.vid-featured:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
.vid-featured-thumb{position:relative;min-height:320px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.vid-featured-play{width:72px;height:72px;border-radius:50%;background:rgba(0,200,83,.92);color:var(--black);display:flex;align-items:center;justify-content:center;font-size:24px;z-index:1;transition:transform .25s;padding-left:4px;box-shadow:0 8px 24px rgba(0,200,83,.35)}
.vid-featured:hover .vid-featured-play{transform:scale(1.12)}
.vid-featured-badge{position:absolute;top:16px;left:16px;background:var(--green);color:var(--white);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:5px 14px;border-radius:50px;z-index:1}
.vid-featured-info{padding:36px 32px;display:flex;flex-direction:column;justify-content:center}
.vid-featured-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--green);margin-bottom:10px}
.vid-featured-info h4{font-family:var(--font-display);font-size:28px;text-transform:uppercase;letter-spacing:.5px;line-height:1.05;margin-bottom:12px;color:var(--white)}

/* ═══ EXPERT SECTION — PROMINENT ═══ */
.expert-banner{background:linear-gradient(135deg,#0a0a1a 0%,#0d0d2a 50%,#0a0a1a 100%);border-top:3px solid var(--green);padding:72px 0;margin:0;position:relative;overflow:hidden}
.expert-banner::before{content:'';position:absolute;top:-150px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(41,98,255,.1) 0%,transparent 70%);border-radius:50%}

.expert-inner{max-width:1440px;margin:0 auto;padding:0 40px;position:relative;z-index:1}

.expert-top p{font-size:15px;color:var(--grey);max-width:640px;margin:0 auto;line-height:1.8}
.expert-services{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px}
.exp-service{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:28px 24px;text-align:center;cursor:pointer;transition:all .25s var(--ease);position:relative;overflow:hidden}
.exp-service::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green);transform:scaleX(0);transition:transform .3s var(--ease)}

.exp-service:hover::before{transform:scaleX(1)}
.exp-service .es-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;background:var(--green-bg)}
.exp-service .es-title{font-size:15px;font-weight:800;margin-bottom:6px}
.exp-service .es-desc{font-size:12px;color:var(--grey);line-height:1.6}
.exp-service .es-cta{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;color:var(--green);text-decoration:underline;text-underline-offset:3px}
.exp-service:hover .es-cta{color:var(--white)}
.expert-trust{display:flex;justify-content:center;gap:40px;margin-top:12px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
.expert-trust .et-item{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--grey)}
.expert-trust .et-item strong{color:var(--white);font-size:15px}

/* ═══ MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:30px;overflow-y:auto}
.modal-bg.open{display:flex}
.mdl{background:var(--dark2);border-radius:16px;max-width:960px;width:100%;position:relative;animation:mUp .25s var(--ease)}

.mdl-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}

.mdl-grid{display:grid;grid-template-columns:1fr 1fr}
.mdl-img{background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;padding:40px;border-radius:16px 0 0 16px;min-height:320px}
.mdl-img img{width:100%;max-height:400px;object-fit:contain}
.mdl-body{padding:32px;overflow-y:auto;max-height:85vh}
.mdl-body .mb{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--green);font-weight:700}

.mdl-body .mpr{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.mdl-body .mprice{font-size:28px;font-weight:800;color:var(--green)}.mdl-body .mold{font-size:15px;color:var(--grey);text-decoration:line-through}
.mdl-body .m3x{font-size:11px;color:var(--grey);background:var(--green-bg);display:inline-block;padding:4px 12px;border-radius:50px;font-weight:600;margin-bottom:16px}
.specs-block{margin:16px 0}.specs-block h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;color:var(--grey3)}
.sp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sp-label{font-size:11px;color:var(--grey);width:80px;flex-shrink:0;font-weight:600}
.sp-bar{flex:1;height:5px;background:var(--dark3);border-radius:3px;overflow:hidden}
.sp-fill{height:100%;border-radius:3px;transition:width .8s var(--ease)}
.sp-val{font-size:10px;font-weight:800;width:32px;text-align:right}
.sp-meta{margin-top:10px;font-size:11px;color:var(--grey);line-height:1.8}
.sp-meta strong{color:var(--grey3)}
.expert-box{background:rgba(255,193,7,.06);border-left:3px solid #ffc107;padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0}
.expert-box .eb-label{font-size:9px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.expert-box .eb-text{font-size:11px;line-height:1.7;color:var(--grey3)}
.mdl-actions{display:flex;flex-direction:column;gap:6px;margin-top:16px}
.mdl-qty{display:flex;align-items:center;gap:0;margin-bottom:6px}
.mdl-qty button{width:36px;height:36px;background:var(--dark3);border:none;color:var(--white);font-size:16px;font-weight:700;cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:center}
.mdl-qty button:first-child{border-radius:8px 0 0 8px}.mdl-qty button:last-child{border-radius:0 8px 8px 0}
.mdl-qty button:hover{background:var(--green);color:var(--white)}
.mdl-qty span{width:44px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--dark3);font-size:14px;font-weight:700}
.xsell{background:rgba(255,255,255,.03);border-radius:10px;padding:14px;margin-top:14px}
.xsell h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;color:var(--grey)}
.xsell-items{display:flex;gap:6px}
.xsell-it{display:flex;align-items:center;gap:8px;background:var(--dark3);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 12px;flex:1;cursor:pointer;transition:border .12s}
.xsell-it:hover{border-color:var(--green)}
.xsell-it img{width:32px;height:32px;object-fit:contain;border-radius:4px}
.xsell-it .xn{font-size:9px;font-weight:600}.xsell-it .xp{font-size:10px;font-weight:700;color:var(--green)}
.mdl-reviews{margin-top:16px}.mdl-reviews h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--grey);margin-bottom:8px}
.rv{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.rv .rv-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.rv .rv-av{width:24px;height:24px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--green)}
.rv .rv-name{font-size:11px;font-weight:600}.rv .rv-lev{font-size:8px;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:50px;color:var(--grey);font-weight:600}
.rv .rv-stars{margin-left:auto;font-size:10px;color:#ffc107}.rv .rv-text{font-size:11px;color:var(--grey);line-height:1.6}

/* ═══ CART SIDEBAR ═══ */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:none}
.cart-overlay.open{display:block}
.cart-side{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:var(--dark2);z-index:260;transition:right .35s var(--ease);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.06)}
.cart-side.open{right:0}
.cart-hd{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.06)}
.cart-hd h3{font-family:var(--font-display);font-size:22px;letter-spacing:1px;text-transform:uppercase}
.cart-hd button{background:none;border:none;color:var(--white);font-size:20px;cursor:pointer}
.cart-body{flex:1;overflow-y:auto;padding:16px 24px}

.ci-info{flex:1}.ci-name{font-size:12px;font-weight:700;color:var(--white)}.ci-price{font-size:13px;color:var(--green);font-weight:700;margin-top:2px}

.cart-empty{text-align:center;padding:48px 20px;color:var(--grey);font-size:13px}

.cart-3x{font-size:10px;color:var(--grey);margin-bottom:12px}

/* ═══ FILTERS ═══ */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.fbtn{padding:8px 18px;border:1px solid var(--grey2);border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--white);transition:all .15s}
.fbtn:hover,.fbtn.active{border-color:var(--green);color:var(--green);background:var(--green-bg)}

/* ═══ INFO MODAL ═══ */
.info-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.info-bg.open{display:flex}
.info-box{background:var(--dark2);border-radius:16px;max-width:500px;width:100%;padding:36px;position:relative;animation:mUp .2s var(--ease);border:1px solid rgba(255,255,255,.06)}
.info-box h2{font-family:var(--font-display);font-size:28px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.info-box p{font-size:13px;color:var(--grey);line-height:1.8;margin-bottom:20px}
.info-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ═══ FOOTER ═══ */
.footer{background:var(--dark);color:#fff;padding:48px 40px 24px;margin-top:0}
.footer-inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
.f-brand{font-family:var(--font-display);font-size:24px;letter-spacing:2px;margin-bottom:10px}.f-brand span{color:var(--green)}
.f-desc{font-size:11px;color:var(--grey);line-height:1.8;max-width:280px}
.f-col h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--grey2);margin-bottom:14px}
.f-col a{display:block;color:var(--grey);font-size:12px;margin-bottom:8px;cursor:pointer;transition:color .15s}
.f-col a:hover{color:var(--white)}
.f-bottom{max-width:1440px;margin:28px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;font-size:10px;color:var(--grey2)}

.f-pay{background:rgba(255,255,255,.04);padding:4px 10px;border-radius:4px;font-size:9px;font-weight:600;color:var(--grey)}

.toast{display:none;position:fixed;bottom:24px;right:24px;background:var(--green);color:var(--white);padding:14px 24px;border-radius:50px;font-size:12px;font-weight:800;box-shadow:0 8px 24px rgba(46,204,64,.3);z-index:400;letter-spacing:.3px}
.toast.show{display:block;animation:mUp .2s var(--ease)}
.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ═══ WISHLIST HEARTS ═══ */
.pcard .p-wish{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .2s;backdrop-filter:blur(4px)}

.pcard .p-wish.liked{background:var(--red);color:var(--white)}
.mdl-wish{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid rgba(255,255,255,.1);border-radius:50px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;background:transparent;color:var(--white)}
.mdl-wish:hover{border-color:var(--red);color:var(--red)}
.mdl-wish.liked{border-color:var(--red);background:rgba(231,76,60,.1);color:var(--red)}

/* ═══ WISHLIST PANEL ═══ */

.wish-box{background:var(--dark2);border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:32px;position:relative;animation:mUp .25s var(--ease);border:1px solid rgba(255,255,255,.06)}

/* ═══ NEWSLETTER POPUP ═══ */
.nl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:350;display:none;align-items:center;justify-content:center;padding:20px}

.lang-opt.active{color:var(--green)}

/* ═══ VISIO BOOKING ═══ */

.visio-box{background:var(--dark2);border-radius:16px;max-width:520px;width:100%;padding:36px;position:relative;animation:mUp .25s var(--ease);border:1px solid rgba(255,255,255,.06)}

/* ═══ TRIAL PROGRAM ═══ */

let advStep=0,advAnswers=[],advDone=false;
function advSelect(label){
  advAnswers.push(label);
  // Find next applicable step
  let nextStep=advStep+1;
  while(nextStep<ADV_STEPS.length && ADV_STEPS[nextStep].cond && !ADV_STEPS[nextStep].cond(advAnswers)){nextStep++}
  if(nextStep<ADV_STEPS.length){advStep=nextStep}else{advDone=true}
  renderAdvisor();
}
function advReset(){advStep=0;advAnswers=[];advDone=false;renderAdvisor()}

function getAdvResults(){
  const [equip,level,style,budget]=advAnswers;
  const typeMap={Défensif:'Contrôle',Polyvalent:'Allround',Offensif:'Power'};

  if(equip==='Accessoires'){
    return P.filter(x=>['Grips','Sacs'].includes(x.cat)).sort((a,b)=>(b.r||0)-(a.r||0)).slice(0,4);
  }

  if(equip==='Chaussures'){
    let pool=P.filter(x=>x.cat==='Chaussures');
    if(budget==='Économique') pool=pool.filter(x=>x.p<120);
    else if(budget==='Premium') pool=pool.filter(x=>x.p>120);
    if(pool.length===0) pool=P.filter(x=>x.cat==='Chaussures');
    return pool.sort((a,b)=>(b.r||0)-(a.r||0)).slice(0,3);
  }

  if(equip==='Pack complet'){
    const raq=getFilteredRackets(level,typeMap[style],budget);
    const shoe=P.filter(x=>x.cat==='Chaussures').sort((a,b)=>(b.r||0)-(a.r||0))[0];
    const grip=P.filter(x=>x.cat==='Grips').sort((a,b)=>(b.r||0)-(a.r||0))[0];
    return [...raq.slice(0,2),shoe,grip].filter(Boolean);
  }

  // Raquette
  return getFilteredRackets(level,typeMap[style],budget);
}

function getFilteredRackets(level,type,budget){
  let pool=[...rackets];
  // Level filter with adjacent
  if(level==='Débutant') pool=pool.filter(x=>x.lv==='Débutant'||x.lv==='Intermédiaire');
  else if(level==='Avancé') pool=pool.filter(x=>x.lv==='Avancé'||x.lv==='Intermédiaire');
  // Type: prefer exact, fallback to Allround
  const exact=pool.filter(x=>x.t===type);
  const allround=pool.filter(x=>x.t==='Allround');
  if(exact.length>=2) pool=exact;
  else pool=[...exact,...allround.filter(x=>!exact.find(e=>e.id===x.id))];
  // Budget
  if(budget==='Économique') pool=pool.filter(x=>x.p<180);
  else if(budget==='Intermédiaire') pool=pool.filter(x=>x.p>=120&&x.p<=300);
  else if(budget==='Premium') pool=pool.filter(x=>x.p>240);
  // Relaxation if empty
  if(pool.length===0){
    pool=[...rackets];
    if(level==='Débutant') pool=pool.filter(x=>x.lv==='Débutant'||x.lv==='Intermédiaire');
    if(type) {const t=pool.filter(x=>x.t===type);if(t.length) pool=t;}
  }
  if(pool.length===0) pool=[...rackets];
  pool.sort((a,b)=>{
    let sa=(a.t===type?20:0)+(a.lv===level?10:0)+(a.r||0);
    let sb=(b.t===type?20:0)+(b.lv===level?10:0)+(b.r||0);
    return sb-sa;
  });
  return pool.slice(0,3);
}

function getAdvMatch(p){
  let s=65;const[,level,style]=advAnswers;const typeMap={Défensif:'Contrôle',Polyvalent:'Allround',Offensif:'Power'};
  if(p.lv===level)s+=12;if(p.t===typeMap[style])s+=15;else if(p.t==='Allround')s+=5;
  if((p.r||0)>=4.7)s+=5;return Math.min(98,s);
}
function getAdvWhy(p){
  const[equip,level,style]=advAnswers;const typeMap={Défensif:'Contrôle',Polyvalent:'Allround',Offensif:'Power'};
  if(p.cat!=='Raquettes') return `${p.cat} recommandé pour compléter votre équipement. Très apprécié des joueurs.`;
  const parts=[];
  if(p.t===typeMap[style]) parts.push(`Style ${p.t.toLowerCase()} adapté à votre jeu.`);
  else parts.push('Polyvalente, s\'adapte à votre style.');
  if(p.lv===level) parts.push(`Niveau ${level.toLowerCase()}.`);
  if((p.r||0)>=4.5) parts.push(`Note : ${p.r}/5 (${p.rv} avis).`);
  return parts.join(' ');
}

/* ── Advisor render ── */
function renderAdvisor(){
  const el=$('advisorBox');if(!el)return;
  const applicableSteps=ADV_STEPS.filter((s,i)=>i<=advStep&&(!s.cond||s.cond(advAnswers)));
  const totalSteps=ADV_STEPS.filter(s=>!s.cond||s.cond(advAnswers)).length;
  const currentIdx=applicableSteps.length-1;
  const dots=Array.from({length:totalSteps},(_,i)=>{
    let c='finder-dot';if(advDone)c+=' done';else if(i<=currentIdx)c+=' done';
    return `<div class="${c}"></div>`;
  }).join('');
  const advStepsT=[
    {q:t('advQ1'),opts:[{l:t('advRaquette'),d:t('advRaquetteD'),icon:"🏓",v:"Raquette"},{l:t('advChaussures'),d:t('advChaussuresD'),icon:"👟",v:"Chaussures"},{l:t('advPack'),d:t('advPackD'),icon:"🎒",v:"Pack complet"},{l:t('advAccessoires'),d:t('advAccessoiresD'),icon:"🎾",v:"Accessoires"}]},
    {q:t('advQ2'),opts:[{l:t('advDebut'),d:t('advDebutD'),icon:"🌱",v:"Débutant"},{l:t('advInter'),d:t('advInterD'),icon:"⚡",v:"Intermédiaire"},{l:t('advAvance'),d:t('advAvanceD'),icon:"🔥",v:"Avancé"}]},
    {q:t('advQ3'),opts:[{l:t('advDef'),d:t('advDefD'),icon:"🛡️",v:"Défensif"},{l:t('advPoly'),d:t('advPolyD'),icon:"⚖️",v:"Polyvalent"},{l:t('advOff'),d:t('advOffD'),icon:"⚔️",v:"Offensif"}]},
    {q:t('advQ4'),opts:[{l:t('advEco'),d:t('advEcoD'),icon:"💰",v:"Économique"},{l:t('advMid'),d:t('advMidD'),icon:"💎",v:"Intermédiaire"},{l:t('advPrem'),d:t('advPremD'),icon:"👑",v:"Premium"}]},
  ];
  if(!advDone){
    const step=advStepsT[advStep]||advStepsT[0];
    el.innerHTML=`<div class="finder-progress">${dots}</div><div class="finder-q">${step.q}</div><div class="finder-opts">${step.opts.map(o=>`<div class="finder-opt" onclick="advSelect('${o.v}')"><span>${o.l}</span><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>`).join('')}</div>`;
  } else {
    const results=getAdvResults();
    el.innerHTML=`<div class="finder-results-wrap"><div class="finder-progress">${dots}</div><div style="font-size:11px;color:var(--grey);margin-bottom:16px">${t('advProfile')} : ${advAnswers.join(' → ')}</div><div class="advisor-results">${results.map((p,i)=>`<div class="advisor-card" onclick="openModal(${p.id})">${img(p.img,p.n,'width:100%;height:120px;object-fit:contain')}<div class="advisor-match">✓ ${getAdvMatch(p)}% ${t('advCompatible')}</div><div class="ac-name">${p.n}</div><div class="ac-why">${getAdvWhy(p)}</div><div class="ac-price">${price(p.p)}</div><button class="ac-add" onclick="event.stopPropagation();addToCart(${p.id})">${t('addToCart')}</button></div>`).join('')}</div><div class="advisor-reset" onclick="advReset()">${t('advReset')}</div></div>`;
    // Also send results to chatbot
    if(chatOpen){
      const names=results.map(r=>r.n).join(', ');
      const chatMsg={fr:`✓ Analyse terminée ! Voici mes recommandations : **${names}**. Cliquez sur une carte pour voir les détails.`,en:`✓ Analysis complete! Here are my recommendations: **${names}**. Click a card to see details.`,da:`✓ Analyse færdig! Her er mine anbefalinger: **${names}**. Klik på et kort for detaljer.`};
      addBotMsg(chatMsg[currentLang]||chatMsg.fr);
    }
  }
}

/* ── Category page ── */
function showCat(cat){
  view=cat;renderNav();
  let items=cat==='Outlet'?P.filter(x=>x.op&&x.op>x.p):P.filter(x=>x.cat===cat);
  const brands=[...new Set(items.map(x=>x.b))];
  const catLabel=t('cat'+cat)||cat;
  $('app').innerHTML=`<div style="height:80px"></div><div class="sec sec-dark"><span class="sec-back" onclick="goHome()">${t('backHome')}</span><div class="sec-header"><div><h2>${catLabel}</h2><div class="sh-sub">${items.length} ${t('products')}</div></div></div><div class="filters"><span class="fbtn active" onclick="filterCat('${cat}','all',this)">${t('all')}</span>${brands.map(b=>`<span class="fbtn" onclick="filterCat('${cat}','${b}',this)">${b}</span>`).join('')}</div><div class="pgrid" id="catGrid">${items.map(p=>card(p)).join('')}</div></div>${footerHTML()}`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function filterCat(cat,brand,el){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');
  let items=cat==='Outlet'?P.filter(x=>x.op&&x.op>x.p):P.filter(x=>x.cat===cat);
  if(brand!=='all') items=items.filter(x=>x.b===brand);
  $('catGrid').innerHTML=items.length?items.map(p=>card(p)).join(''):'<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--grey)">Aucun produit</div>';
}

function toggleChat(){
  chatOpen=!chatOpen;$('chatPanel').classList.toggle('open',chatOpen);
  const b=$('chatBtn').querySelector('.cb-badge');if(b)b.style.display=chatOpen?'none':'flex';
  const ci=$('chatInput');if(ci)ci.placeholder=t('chatPlaceholder');
  if(chatOpen&&chatHistory.length===0){addBotMsg(t('chatWelcome'));renderQuickReplies()}
}
function addBotMsg(msg){chatHistory.push({from:'bot',txt:msg});renderChat()}
function addUserMsg(msg){chatHistory.push({from:'user',txt:msg});renderChat()}
function renderChat(){
  $('chatMessages').innerHTML=chatHistory.map(m=>{
    const f=m.txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    return `<div class="cb-msg ${m.from==='bot'?'cb-msg-bot':'cb-msg-user'}">${f}</div>`;
  }).join('');$('chatMessages').scrollTop=$('chatMessages').scrollHeight;
}
function renderQuickReplies(){$('chatQuick').innerHTML=[t('chatQuick1'),t('chatQuick2'),t('chatQuick3'),t('chatQuick4'),t('chatQuick5'),t('chatQuick6')].map(q=>`<button onclick="quickReply(this.textContent)">${q}</button>`).join('')}
function findResp(q){
  const n=q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let best=null,bestS=0;
  for(const[,d]of Object.entries(CHAT_KB)){for(const kw of d.kw){if(n.includes(kw.normalize('NFD').replace(/[\u0300-\u036f]/g,''))&&kw.length>bestS){bestS=kw.length;best=d}}}
  if(best){const r=best.r;return typeof r==='object'?(r[currentLang]||r.fr):r}
  const fallback={fr:"Je peux vous aider sur :\n🏓 Raquettes, chaussures, grips\n🚚 Livraison & retours\n💳 Paiement 3x\n📹 Conseil visio\n📦 Essai 7 jours",en:"I can help you with:\n🏓 Rackets, shoes, grips\n🚚 Shipping & returns\n💳 Pay in 3x\n📹 Video consultation\n📦 7-day trial",da:"Jeg kan hjælpe dig med:\n🏓 Bat, sko, grips\n🚚 Levering & retur\n💳 Betal i 3x\n📹 Video-rådgivning\n📦 7 dages test"};
  return fallback[currentLang]||fallback.fr;
}
// Action keywords in all languages
const ACT_VISIO=['visio','video','rdv','consultation','rådgivning','book'];
const ACT_TRIAL=['essai','trial','test','7 jour','7 day','7 dage','prøve','hjemmetest'];
function isAction(q,keywords){const ql=q.toLowerCase();return keywords.some(k=>ql.includes(k))}
function quickReply(q){
  addUserMsg(q);$('chatQuick').innerHTML='';
  if(isAction(q,ACT_VISIO)){setTimeout(()=>{const m={fr:"Je vous ouvre la réservation visio 📹",en:"Opening video booking for you 📹",da:"Åbner video-booking for dig 📹"};addBotMsg(m[currentLang]||m.fr);setTimeout(openVisio,800);setTimeout(renderQuickReplies,1200)},600);return}
  if(isAction(q,ACT_TRIAL)){setTimeout(()=>{const m={fr:"Je vous ouvre le programme d'essai 📦",en:"Opening home trial for you 📦",da:"Åbner hjemmetest for dig 📦"};addBotMsg(m[currentLang]||m.fr);setTimeout(openTrial,800);setTimeout(renderQuickReplies,1200)},600);return}
  setTimeout(()=>{addBotMsg(findResp(q));setTimeout(renderQuickReplies,600)},700);
}
function sendChat(){
  const i=$('chatInput');const q=i.value.trim();if(!q)return;addUserMsg(q);i.value='';$('chatQuick').innerHTML='';
  if(isAction(q,ACT_VISIO)){setTimeout(()=>{const m={fr:"Je vous ouvre la réservation visio ! 📹",en:"Opening video booking! 📹",da:"Åbner video-booking! 📹"};addBotMsg(m[currentLang]||m.fr);setTimeout(openVisio,800);setTimeout(renderQuickReplies,1200)},700);return}
  if(isAction(q,ACT_TRIAL)){setTimeout(()=>{const m={fr:"Je vous ouvre l'essai à domicile ! 📦",en:"Opening home trial! 📦",da:"Åbner hjemmetest! 📦"};addBotMsg(m[currentLang]||m.fr);setTimeout(openTrial,800);setTimeout(renderQuickReplies,1200)},700);return}
  setTimeout(()=>{addBotMsg(findResp(q));setTimeout(renderQuickReplies,600)},800);
}

let visioSlot=null;
function openVisio(){
  visioSlot=null;const today=new Date();const slots=[];
  for(let d=1;d<=6;d++){const dt=new Date(today);dt.setDate(today.getDate()+d);if(dt.getDay()===0)continue;
    const dn=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][dt.getDay()];const ds=dt.getDate()+'/'+(dt.getMonth()+1);
    for(const h of['10:00','14:00','16:00'])slots.push({label:`${dn} ${ds}`,time:h,full:`${dn} ${ds} à ${h}`})}
  $('visioOverlay').innerHTML=`<div class="visio-box"><button class="v-close" onclick="closeVisio()">✕</button><h2>${t('visioTitle')}</h2><div class="v-sub">${t('visioSub')}</div><div class="ck-field"><label>${t('visioName')}</label><input type="text" id="visioName" placeholder="Jean"></div><div class="ck-field"><label>${t('visioEmail')}</label><input type="email" id="visioEmail" placeholder="jean@email.com"></div><div class="ck-field"><label>${t('visioTopic')}</label><input type="text" id="visioTopic" placeholder="${t('visioTopicPh')}"></div><div style="font-size:12px;font-weight:700;margin:14px 0 8px">${t('visioSlotTitle')}</div><div class="v-slots">${slots.slice(0,9).map((s,i)=>`<div class="v-slot" onclick="selVisio(this)" data-full="${s.full}"><strong>${s.label}</strong><span>${s.time}</span></div>`).join('')}</div><button class="btn btn-green btn-full" onclick="confirmVisio()">${t('visioBook')}</button><div class="v-confirm" id="visioConfirm"></div></div>`;
  $('visioOverlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeVisio(){$('visioOverlay').classList.remove('open');document.body.style.overflow=''}
$('visioOverlay').addEventListener('click',e=>{if(e.target===$('visioOverlay'))closeVisio()});
function selVisio(el){document.querySelectorAll('.v-slot').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');visioSlot=el.dataset.full}
function confirmVisio(){
  if(!visioSlot){toast('Sélectionnez un créneau');return}
  const n=$('visioName')?.value,e=$('visioEmail')?.value;if(!n||!e){toast('Remplissez les champs');return}

}

function openWishlist(){
  const items=wishlist.map(id=>P.find(x=>x.id===id)).filter(Boolean);
  $('wishOverlay').innerHTML=`<div class="wish-box">
    <button style="position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="closeWishlist()">✕</button>
    <h2>${t('wishTitle')}</h2>
    ${items.length?items.map(p=>`<div class="wish-item">${img(p.img,p.n,'width:64px;height:64px;object-fit:contain;background:rgba(255,255,255,.03);border-radius:8px')}<div class="wish-item-info"><div class="wish-item-name">${p.n}</div><div class="wish-item-price">${price(p.p)}</div></div><div class="wish-item-actions"><button class="btn btn-green btn-sm" onclick="addToCart(${p.id});closeWishlist()">${t('addToCart')}</button><button style="background:rgba(255,255,255,.06);color:var(--red)" onclick="toggleWish(${p.id});openWishlist()">✕</button></div></div>`).join(''):`<div class="wish-empty">${t('wishEmpty')}</div>`}
  </div>`;
  $('wishOverlay').classList.add('open');
}
function closeWishlist(){$('wishOverlay').classList.remove('open')}
$('wishOverlay').addEventListener('click',e=>{if(e.target===$('wishOverlay'))closeWishlist()});

/* ═══ NEWSLETTER POPUP ═══ */
let nlShown=false;
function showNewsletter(){
  if(nlShown)return;nlShown=true;
  $('nlOverlay').innerHTML=`<div class="nl-box">
    <button class="nl-close" onclick="closeNewsletter()">✕</button>
    <div class="nl-icon">📬</div>
    <h2>${t('nlTitle')}</h2>
    <div class="nl-desc">${t('nlDesc')}</div>
    <input class="nl-input" type="email" id="nlEmail" placeholder="${t('nlPlaceholder')}">
    <div class="nl-check"><input type="checkbox" id="nlConsent" checked><span>${t('nlConsent')}</span></div>
    <button class="btn btn-green btn-full" onclick="submitNewsletter()">${t('nlBtn')}</button>
  </div>`;
  $('nlOverlay').classList.add('open');
}
function closeNewsletter(){$('nlOverlay').classList.remove('open')}
$('nlOverlay').addEventListener('click',e=>{if(e.target===$('nlOverlay'))closeNewsletter()});
function submitNewsletter(){
  const email=$('nlEmail')?.value;const consent=$('nlConsent')?.checked;
  if(!email||!email.includes('@')){toast(t('nlErrorEmail'));return}
  if(!consent){toast(t('nlErrorConsent'));return}
  $('nlOverlay').querySelector('.nl-box').innerHTML=`<div class="nl-success">✓ ${t('nlSuccess')}</div>`;
  setTimeout(closeNewsletter,2500);
}
// Show newsletter popup after 15 seconds
setTimeout(()=>{if(!nlShown)showNewsletter()},15000);
