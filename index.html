<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PadelLife.fr 芒聙聰 L'脙聣quipement Padel Expert</title>
<meta name="description" content="PadelLife.fr Le sp脙漏cialiste fran脙搂ais du padel. Raquettes, chaussures, accessoires. Conseil d'expert, essai 脙聽 domicile 7 jours.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0a0a;--dark:#111;--dark2:#1a1a1a;--dark3:#222;
  --white:#fff;--off:#f7f7f7;--grey:#888;--grey2:#444;--grey3:#ccc;
  --green:#2196F3;--green2:#1976D2;--green-bg:rgba(33,150,243,.08);
  --red:#ff1744;--orange:#ff6d00;--blue:#2979ff;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Inter',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--white);background:var(--black);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:var(--font-body);cursor:pointer;border:none}
img{display:block;max-width:100%}
::selection{background:var(--green);color:var(--white)}

/* 芒聲聬芒聲聬芒聲聬 ANNOUNCEMENT BAR 芒聲聬芒聲聬芒聲聬 */
.announce{background:var(--green);color:var(--white);text-align:center;padding:8px 20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;position:relative;z-index:99}

/* 芒聲聬芒聲聬芒聲聬 HEADER 芒聲聬芒聲聬芒聲聬 */
.hd{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .3s var(--ease),backdrop-filter .3s}
.hd.scrolled{background:rgba(10,10,10,.92);backdrop-filter:blur(20px)}
.hd-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;height:64px}
.hd-logo{font-family:var(--font-display);font-size:28px;letter-spacing:2px;cursor:pointer;display:flex;align-items:baseline;gap:1px}
.hd-logo span{color:var(--green)}
.hd-nav{display:flex;gap:28px;list-style:none}
.hd-nav li{font-size:13px;font-weight:600;cursor:pointer;position:relative;padding:4px 0;letter-spacing:.3px;transition:color .2s}
.hd-nav li:hover{color:var(--green)}
.hd-nav li::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:var(--green);transition:width .25s var(--ease)}
.hd-nav li:hover::after{width:100%}
.hd-nav li.active{color:var(--green)}
.hd-nav li.active::after{width:100%}
.hd-right{display:flex;align-items:center;gap:12px}
.hd-search-btn,.hd-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--white);font-size:16px;transition:background .2s;border:1px solid transparent}
.hd-search-btn:hover,.hd-icon:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1)}
.hd-icon .badge{position:absolute;top:-2px;right:-2px;background:var(--green);color:var(--white);font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.hd-icon{position:relative}

/* 芒聲聬芒聲聬芒聲聬 SEARCH OVERLAY 芒聲聬芒聲聬芒聲聬 */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;flex-direction:column;align-items:center;padding-top:120px;animation:fadeIn .2s}
.search-overlay.open{display:flex}
.search-close{position:absolute;top:20px;right:40px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-box{width:90%;max-width:700px}
.search-box input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--grey2);padding:16px 0;font-size:32px;font-family:var(--font-display);color:var(--white);outline:none;letter-spacing:1px;caret-color:var(--green)}
.search-box input::placeholder{color:var(--grey2)}
.search-box input:focus{border-bottom-color:var(--green)}
.search-results-area{width:90%;max-width:700px;margin-top:20px;max-height:50vh;overflow-y:auto}
.sr-item{display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s;border-radius:4px;padding:12px}
.sr-item:hover{background:rgba(255,255,255,.04)}
.sr-item img{width:56px;height:56px;object-fit:contain;background:rgba(255,255,255,.04);border-radius:6px}
.sr-item .sr-cat{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--grey);font-weight:700}
.sr-item .sr-name{font-size:14px;font-weight:700;margin:2px 0}
.sr-item .sr-price{font-size:13px;color:var(--green);font-weight:700}
.search-trending{margin-top:30px;width:90%;max-width:700px}
.search-trending h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--grey);margin-bottom:12px;font-weight:700}
.search-trending .tags{display:flex;gap:8px;flex-wrap:wrap}
.search-trending .tag{padding:8px 16px;border:1px solid var(--grey2);border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.search-trending .tag:hover{border-color:var(--green);color:var(--green)}

/* 芒聲聬芒聲聬芒聲聬 HERO 芒聲聬芒聲聬芒聲聬 */
.hero{position:relative;height:100vh;min-height:700px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:80px}
.hero-video{position:absolute;inset:0;z-index:0;opacity:1;}
.hero-video video{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,10,0.3) 0%,rgba(10,10,10,0) 40%,rgba(10,10,10,0.6) 100%);z-index:1}
.hero-content{position:relative;z-index:2;text-align:center;max-width:800px}
.hero-tag{font-size:12px;text-transform:uppercase;letter-spacing:3px;color:var(--green);font-weight:700;margin-bottom:16px}
.hero h1{font-family:var(--font-display);font-size:clamp(64px,10vw,120px);line-height:.9;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.hero-desc{font-size:15px;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto 32px;line-height:1.7}
.hero-ctas{display:flex;gap:12px;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:50px;font-size:13px;font-weight:700;transition:all .25s var(--ease);letter-spacing:.3px}
.btn-white{background:var(--white);color:var(--black)}
.btn-white:hover{background:var(--green);color:var(--white);transform:scale(1.03)}
.btn-ghost{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,.3)}
.btn-ghost:hover{border-color:var(--white);background:rgba(255,255,255,.06)}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{background:var(--green2);transform:scale(1.03)}
.btn-dark{background:var(--dark3);color:var(--white)}
.btn-dark:hover{background:var(--green);color:var(--white)}
.btn-sm{padding:10px 20px;font-size:12px}
.btn-full{width:100%;justify-content:center}

/* 芒聲聬芒聲聬芒聲聬 REAS BAR 芒聲聬芒聲聬芒聲聬 */
.reas-bar{background:var(--dark);border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
.reas-inner{max-width:1440px;margin:0 auto;display:flex;padding:0 40px}
.reas-i{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 12px;cursor:pointer;transition:background .2s;border-right:1px solid rgba(255,255,255,.06)}
.reas-i:last-child{border-right:none}
.reas-i:hover{background:rgba(255,255,255,.03)}
.reas-i .ri-icon{font-size:18px}.reas-i strong{font-size:11px;font-weight:700}.reas-i span{font-size:10px;color:var(--grey)}

/* 芒聲聬芒聲聬芒聲聬 SECTION LAYOUTS 芒聲聬芒聲聬芒聲聬 */
.sec{max-width:1440px;margin:0 auto;padding:60px 40px}
.sec-dark{background:var(--black)}
.sec-light{background:rgba(255,255,255,.03);color:var(--white)}
.sec-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px}
.sec-header h2{font-family:var(--font-display);font-size:48px;letter-spacing:1px;text-transform:uppercase;line-height:1}
.sec-header .sh-sub{font-size:13px;color:var(--grey);margin-top:6px}
.sec-link{font-size:12px;font-weight:700;text-decoration:underline;cursor:pointer;transition:color .15s;text-underline-offset:3px}
.sec-link:hover{color:var(--green)}
.sec-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:20px;padding:8px 16px;border-radius:50px;background:rgba(255,255,255,.06);color:var(--white);transition:all .15s}
.sec-back:hover{background:var(--green);color:var(--white)}

/* 芒聲聬芒聲聬芒聲聬 PRODUCT GRID 芒聲聬芒聲聬芒聲聬 */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.pgrid-3{grid-template-columns:repeat(3,1fr)}
.pcard{background:var(--dark2);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s;position:relative}
.pcard:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.pcard .pi{position:relative;background:rgba(255,255,255,.03);padding:20px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
.sec-light .pcard .pi{background:rgba(255,255,255,.03)}
.pcard .pi img{max-width:82%;max-height:82%;object-fit:contain;transition:transform .35s var(--ease)}
.pcard:hover .pi img{transform:scale(1.08)}
.pcard .pbadge{position:absolute;top:12px;left:12px;font-size:9px;font-weight:800;padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px}
.pb-new{background:var(--white);color:var(--white)}.pb-top{background:var(--green);color:var(--white)}
.pb-sale{background:var(--red);color:var(--white)}.pb-expert{background:var(--blue);color:var(--white)}
.pcard .pdisc{position:absolute;top:12px;right:12px;font-size:10px;background:var(--red);color:var(--white);padding:3px 8px;border-radius:50px;font-weight:700}
.pcard .pf{padding:16px 18px 20px}
.pcard .pf .pbrand{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--grey);font-weight:700;margin-bottom:3px}
.pcard .pf .pname{font-size:14px;font-weight:700;margin-bottom:6px;line-height:1.3}
.sec-light .pcard .pf .pname{color:var(--white)}
.pcard .pf .pstars{display:flex;align-items:center;gap:4px;margin-bottom:8px;font-size:11px}
.pcard .pf .pstars .s{color:#ffc107}.pcard .pf .pstars .c{color:var(--grey);font-size:10px}
.pcard .pf .prow{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.pcard .pf .pprice{font-size:18px;font-weight:800}
.pcard .pf .pold{font-size:12px;color:var(--grey);text-decoration:line-through}
.pcard .pf .p3x{font-size:9px;color:var(--grey);margin-bottom:10px}
.pcard .pf .padd{width:100%;padding:10px;background:var(--white);color:var(--black);border-radius:50px;font-size:11px;font-weight:700;transition:all .2s}
.pcard .pf .padd:hover{background:var(--green);color:var(--white)}

/* 芒聲聬芒聲聬芒聲聬 AI ADVISOR (kept for results) 芒聲聬芒聲聬芒聲聬 */
.advisor{background:linear-gradient(135deg,var(--dark) 0%,#0d0d2a 100%);border-radius:16px;padding:48px;margin:0 40px;position:relative;overflow:hidden;border:1px solid rgba(41,98,255,.15)}
.advisor::before{content:'';position:absolute;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,200,83,.08) 0%,transparent 70%);border-radius:50%}
.advisor-inner{position:relative;z-index:1;max-width:900px;margin:0 auto}
.advisor-header{text-align:center;margin-bottom:8px}
.advisor-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(0,200,83,.12);color:var(--green);padding:6px 16px;border-radius:50px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.advisor-header h2{font-family:var(--font-display);font-size:42px;letter-spacing:1px;text-transform:uppercase}
.advisor-sub{text-align:center;color:var(--grey);font-size:13px;margin-bottom:28px}
.advisor-progress{display:flex;gap:4px;justify-content:center;margin-bottom:24px}
.advisor-dot{height:3px;width:60px;border-radius:2px;background:var(--grey2);transition:all .3s}
.advisor-dot.active{background:var(--green);width:80px}.advisor-dot.done{background:var(--white)}
.advisor-q{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px}
.advisor-opts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.advisor-opt{border:2px solid var(--grey2);border-radius:12px;padding:20px 28px;cursor:pointer;text-align:center;transition:all .2s var(--ease);min-width:160px;background:rgba(255,255,255,.02)}
.advisor-opt:hover{border-color:var(--green);background:var(--green-bg);transform:translateY(-2px)}
.advisor-opt .ao-icon{font-size:28px;margin-bottom:8px}
.advisor-opt strong{display:block;font-size:14px;margin-bottom:3px}
.advisor-opt span{font-size:11px;color:var(--grey)}
.advisor-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:24px}
.advisor-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s}
.advisor-card:hover{border-color:var(--green);transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.advisor-card img{width:100%;height:120px;object-fit:contain;margin-bottom:10px}
.advisor-match{display:inline-block;font-size:9px;font-weight:800;background:rgba(0,200,83,.15);color:var(--green);padding:3px 8px;border-radius:50px;margin-bottom:6px}
.advisor-card .ac-name{font-size:13px;font-weight:700;margin-bottom:3px}
.advisor-card .ac-why{font-size:10px;color:var(--grey);line-height:1.5;margin-bottom:6px}
.advisor-card .ac-price{font-size:17px;font-weight:800;color:var(--green)}
.advisor-card .ac-add{width:100%;padding:8px;background:var(--white);color:var(--black);border-radius:50px;font-size:10px;font-weight:700;margin-top:8px;transition:all .15s}
.advisor-card .ac-add:hover{background:var(--green)}
.advisor-reset{text-align:center;margin-top:16px;font-size:12px;font-weight:700;color:var(--green);cursor:pointer;text-decoration:underline}

/* 芒聲聬芒聲聬芒聲聬 RACKET FINDER (SPLIT-SCREEN) 芒聲聬芒聲聬芒聲聬 */
.finder{display:flex;min-height:85vh;background:var(--black);color:var(--white);margin:0}
.finder-left{width:50%;padding:72px 5vw;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.06)}
.finder-tag{color:var(--green);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.finder-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
.finder-title{font-family:var(--font-display);font-size:clamp(42px,5vw,72px);line-height:.88;text-transform:uppercase;margin-bottom:14px}
.finder-desc{font-size:14px;color:rgba(255,255,255,.5);line-height:1.65;font-weight:500;margin-bottom:36px;max-width:420px}
.finder-progress{display:flex;gap:6px;margin-bottom:28px}
.finder-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.12);transition:background .3s}
.finder-dot.done{background:var(--green)}
.finder-q{font-family:var(--font-display);font-size:26px;text-transform:uppercase;margin-bottom:14px;letter-spacing:.5px}
.finder-opts{display:flex;flex-direction:column;gap:10px;width:100%;animation:finderFadeUp .35s cubic-bezier(.16,1,.3,1)}
@keyframes finderFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.finder-opt{padding:18px 22px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;color:var(--white);font-weight:700;font-size:14px;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .25s var(--ease)}
.finder-opt:hover{background:var(--green);border-color:var(--green);transform:translateX(10px)}
.finder-opt svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.finder-right{width:50%;position:relative;overflow:hidden;background:#111}
.finder-right img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.4;filter:grayscale(50%);transition:opacity .5s,filter .5s}
.finder-right:hover img{opacity:.6;filter:grayscale(0%)}
.finder-expert{position:absolute;bottom:36px;left:36px;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);padding:18px 22px;border-left:3px solid var(--green);border-radius:0 8px 8px 0}
.finder-expert h4{font-family:var(--font-display);font-size:22px;text-transform:uppercase;color:var(--white);margin-bottom:3px}
.finder-expert p{font-size:12px;color:rgba(255,255,255,.5);font-weight:600}
.finder-expert-status{display:flex;align-items:center;gap:6px;font-size:11px;color:#00e676;font-weight:700;margin-top:8px}
.finder-expert-status::before{content:'';width:6px;height:6px;background:#00e676;border-radius:50%;animation:pulse 2s infinite}
.finder-results-wrap{animation:finderFadeUp .35s cubic-bezier(.16,1,.3,1)}
@media(max-width:900px){
  .finder{flex-direction:column}
  .finder-left,.finder-right{width:100%}
  .finder-right{height:280px}
}

/* 芒聲聬芒聲聬芒聲聬 GUIDES PAR NIVEAU 芒聲聬芒聲聬芒聲聬 */
.guides-section{padding:80px 40px 60px;background:rgba(255,255,255,.03);max-width:100%}
.guides-inner{max-width:1440px;margin:0 auto}
.guides-tag{text-align:center;display:block;margin-bottom:14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--green)}
.guides-title{font-family:var(--font-display);font-size:clamp(32px,4vw,52px);text-transform:uppercase;text-align:center;margin-bottom:12px;color:var(--white);letter-spacing:1px}
.guides-sub{text-align:center;color:var(--grey);font-size:14px;font-weight:500;margin-bottom:48px;max-width:640px;margin-left:auto;margin-right:auto;line-height:1.7}
.guides-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.guide-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:30px 26px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:all .3s var(--ease);text-decoration:none;color:var(--white)}
.guide-card:hover{border-color:var(--green);transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.guide-level{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--green)}
.guide-card h3{font-family:var(--font-display);font-size:22px;text-transform:uppercase;line-height:1.05;letter-spacing:.5px}
.guide-card p{font-size:12px;color:var(--grey);font-weight:500;line-height:1.6}
.guide-arrow{margin-top:auto;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--green);letter-spacing:.8px;padding-top:6px}
.guide-arrow svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2;transition:transform .2s}
.guide-card:hover .guide-arrow svg{transform:translateX(4px)}

/* 芒聲聬芒聲聬芒聲聬 VIDEO GUIDES ENHANCED 芒聲聬芒聲聬芒聲聬 */
.guides-vid-header{text-align:center;margin-bottom:32px}
.guides-vid-header h3{font-family:var(--font-display);font-size:36px;letter-spacing:1px;text-transform:uppercase;color:var(--white);margin-bottom:8px}
.guides-vid-header p{font-size:13px;color:var(--grey);max-width:560px;margin:0 auto;line-height:1.7}
.vid-featured{display:grid;grid-template-columns:1.4fr 1fr;gap:0;background:var(--dark2);border-radius:14px;overflow:hidden;cursor:pointer;margin-bottom:24px;border:1px solid rgba(255,255,255,.06);transition:transform .3s var(--ease),box-shadow .3s}
.vid-featured:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
.vid-featured-thumb{position:relative;min-height:320px;display:flex;align-items:center;justify-content:center;overflow:hidden}

function getFilteredRackets(level,type,budget){
  let pool=[...rackets];
  // Level filter with adjacent
  if(level==='D脙漏butant') pool=pool.filter(x=>x.lv==='D脙漏butant'||x.lv==='Interm脙漏diaire');
  else if(level==='Avanc脙漏') pool=pool.filter(x=>x.lv==='Avanc脙漏'||x.lv==='Interm脙漏diaire');
  // Type: prefer exact, fallback to Allround
  const exact=pool.filter(x=>x.t===type);
  const allround=pool.filter(x=>x.t==='Allround');
  if(exact.length>=2) pool=exact;
  else pool=[...exact,...allround.filter(x=>!exact.find(e=>e.id===x.id))];
  // Budget
  if(budget==='脙聣conomique') pool=pool.filter(x=>x.p<180);
  else if(budget==='Interm脙漏diaire') pool=pool.filter(x=>x.p>=120&&x.p<=300);
  else if(budget==='Premium') pool=pool.filter(x=>x.p>240);
  // Relaxation if empty
  if(pool.length===0){
    pool=[...rackets];
    if(level==='D脙漏butant') pool=pool.filter(x=>x.lv==='D脙漏butant'||x.lv==='Interm脙漏diaire');
    if(type) {const t=pool.filter(x=>x.t===type);if(t.length) pool=t;}
  }
  if(pool.length===0) pool=[...rackets];
  pool.sort((a,b)=>{
    let sa=(a.t===type?20:0)+(a.lv===level?10:0)+(a.r||0);
    let sb=(b.t===type?20:0)+(b.lv===level?10:0)+(b.r||0);
    return sb-sa;
  });
  return pool.slice(0,3);
}

    ${accTab==='register'?`<div class="ck-field"><label>${t('accConfirmPwd')}</label><input type="password" placeholder="芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄"></div><div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;cursor:pointer" onclick="this.querySelector('input').click()"><input type="checkbox" style="accent-color:var(--green);width:18px;height:18px;margin-top:1px;flex-shrink:0" onclick="event.stopPropagation()"><span style="font-size:12px;color:var(--grey3);line-height:1.5">${t('accCGV')}</span></div><div style="display:flex;align-items:flex-start;gap:10px;padding:4px 0;cursor:pointer" onclick="this.querySelector('input').click()"><input type="checkbox" checked style="accent-color:var(--green);width:18px;height:18px;margin-top:1px;flex-shrink:0" onclick="event.stopPropagation()"><span style="font-size:12px;color:var(--grey3);line-height:1.5">${t('accNewsletter')}</span></div>`:`<div style="text-align:right;margin-bottom:12px"><span style="font-size:11px;color:var(--green);cursor:pointer">${t('accForgot')}</span></div>`}
    <button class="btn btn-green btn-full" style="padding:13px" onclick="doAuth()">${accTab==='login'?t('accBtnLogin'):t('accBtnRegister')}</button>
    ${accTab==='register'?`<div style="text-align:center;margin-top:14px;font-size:11px;color:var(--grey)">${t('accPerks')}</div>`:''}
  </div>`;
}
function doAuth(){closeAccount();toast(accTab==='login'?t('accLogin')+' 芒聹聯':t('accRegister')+' 冒聼聨聣')}

/* 芒聲聬芒聲聬芒聲聬 WISHLIST SYSTEM 芒聲聬芒聲聬芒聲聬 */
let wishlist=[];
function toggleWish(id){
  const i=wishlist.indexOf(id);
  if(i>=0){wishlist.splice(i,1);toast(t('wishRemoved'))}
  else{wishlist.push(id);toast(t('wishAdded'))}
  updateWishBadge();
  // Re-render current view to update hearts
  if(view==='home')goHome();else showCat(view);
}
function updateWishBadge(){
  const b=$('wishBadge');if(b){b.textContent=wishlist.length;b.classList.toggle('hidden',wishlist.length===0)}
}
function openWishlist(){
  const items=wishlist.map(id=>P.find(x=>x.id===id)).filter(Boolean);
  $('wishOverlay').innerHTML=`<div class="wish-box">
    <button style="position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="closeWishlist()">芒聹聲</button>
    <h2>${t('wishTitle')}</h2>
    ${items.length?items.map(p=>`<div class="wish-item">${img(p.img,p.n,'width:64px;height:64px;object-fit:contain;background:rgba(255,255,255,.03);border-radius:8px')}<div class="wish-item-info"><div class="wish-item-name">${p.n}</div><div class="wish-item-price">${price(p.p)}</div></div><div class="wish-item-actions"><button class="btn btn-green btn-sm" onclick="addToCart(${p.id});closeWishlist()">${t('addToCart')}</button><button style="background:rgba(255,255,255,.06);color:var(--red)" onclick="toggleWish(${p.id});openWishlist()">芒聹聲</button></div></div>`).join(''):`<div class="wish-empty">${t('wishEmpty')}</div>`}
  </div>`;
  $('wishOverlay').classList.add('open');
}
function closeWishlist(){$('wishOverlay').classList.remove('open')}
$('wishOverlay').addEventListener('click',e=>{if(e.target===$('wishOverlay'))closeWishlist()});

/* 芒聲聬芒聲聬芒聲聬 NEWSLETTER POPUP 芒聲聬芒聲聬芒聲聬 */
let nlShown=false;
function showNewsletter(){
  if(nlShown)return;nlShown=true;
  $('nlOverlay').innerHTML=`<div class="nl-box">
    <button class="nl-close" onclick="closeNewsletter()">芒聹聲</button>
    <div class="nl-icon">冒聼聯卢</div>
    <h2>${t('nlTitle')}</h2>
    <div class="nl-desc">${t('nlDesc')}</div>
    <input class="nl-input" type="email" id="nlEmail" placeholder="${t('nlPlaceholder')}">
    <div class="nl-check"><input type="checkbox" id="nlConsent" checked><span>${t('nlConsent')}</span></div>
    <button class="btn btn-green btn-full" onclick="submitNewsletter()">${t('nlBtn')}</button>
  </div>`;
  $('nlOverlay').classList.add('open');
}
function closeNewsletter(){$('nlOverlay').classList.remove('open')}
$('nlOverlay').addEventListener('click',e=>{if(e.target===$('nlOverlay'))closeNewsletter()});
function submitNewsletter(){
  const email=$('nlEmail')?.value;const consent=$('nlConsent')?.checked;
  if(!email||!email.includes('@')){toast(t('nlErrorEmail'));return}
  if(!consent){toast(t('nlErrorConsent'));return}
  $('nlOverlay').querySelector('.nl-box').innerHTML=`<div class="nl-success">芒聹聯 ${t('nlSuccess')}</div>`;
  setTimeout(closeNewsletter,2500);
}
// Show newsletter popup after 15 seconds
setTimeout(()=>{if(!nlShown)showNewsletter()},15000);
